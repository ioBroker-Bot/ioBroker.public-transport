  <text x="45" y="268" font-family="Courier New, monospace" font-size="13" fill="#00ff00" font-weight="bold" text-anchor="middle">17:46</text>
  <text x="95" y="268" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
