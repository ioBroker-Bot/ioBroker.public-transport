  <text x="190" y="228" font-family="Courier New, monospace" font-size="13" fill="#00ff00" font-weight="bold" text-anchor="middle">15:27</text>
  <text x="240" y="228" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
  <text x="285" y="228" font-family="Courier New, monospace" font-size="12" fill="#ffcc00" text-anchor="middle">2</text>
  <text x="340" y="228" font-family="Courier New, monospace" font-size="12" fill="#ffffff" text-anchor="middle">1</text>
  
