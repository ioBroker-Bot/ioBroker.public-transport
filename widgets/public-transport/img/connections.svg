  <!-- Header Text -->
  <text x="200" y="32" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" text-anchor="middle" font-weight="bold">VERBINDUNGEN</text>
  
  <!-- Spaltenüberschriften -->
  <rect width="400" height="30" y="53" fill="#2c2c2c"/>
  <text x="45" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">AB</text>
  <text x="95" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">+MIN</text>
  <text x="140" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">GL</text>
  <text x="190" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">AN</text>
  <text x="240" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">+MIN</text>
  <text x="285" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">GL</text>
  <text x="340" y="73" font-family="Courier New, monospace" font-size="10" fill="#ffcc00" font-weight="bold" text-anchor="middle">UMS</text>
  
  <!-- Beispiel-Zeilen -->
