  <text x="140" y="108" font-family="Courier New, monospace" font-size="12" fill="#ffcc00" text-anchor="middle">5</text>
  <text x="190" y="108" font-family="Courier New, monospace" font-size="13" fill="#00ff00" font-weight="bold" text-anchor="middle">18:41</text>
  <text x="240" y="108" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
