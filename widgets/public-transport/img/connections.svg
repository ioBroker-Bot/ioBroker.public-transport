  <text x="240" y="268" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
  <text x="285" y="268" font-family="Courier New, monospace" font-size="12" fill="#ffcc00" text-anchor="middle">--</text>
  <text x="340" y="268" font-family="Courier New, monospace" font-size="12" fill="#ffffff" text-anchor="middle">3</text>
  
