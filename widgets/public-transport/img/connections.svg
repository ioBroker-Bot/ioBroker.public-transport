  <text x="95" y="148" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
  <text x="140" y="148" font-family="Courier New, monospace" font-size="12" fill="#ffcc00" text-anchor="middle">5</text>
  <text x="190" y="148" font-family="Courier New, monospace" font-size="13" fill="#00ff00" font-weight="bold" text-anchor="middle">19:41</text>
  <text x="240" y="148" font-family="Courier New, monospace" font-size="12" fill="#00ff00" text-anchor="middle">0</text>
